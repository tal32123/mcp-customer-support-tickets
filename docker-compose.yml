services:
  mcp:
    build: .
    image: mcp-customer-support-tickets:latest
    container_name: mcp-customer-support-tickets
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      PORT: "8000"
      MCP_CST_CACHE_DIR: /data
    volumes:
      - mcp_data:/data

volumes:
  mcp_data:
